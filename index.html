// TTS - Google 번역 새 탭 방식 (가장 확실)
// 발음 팝업 표시
function speak(e, text, setPopup) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  if (setPopup) setPopup(text);
}

// 성조별 색상
function toneColor(py) {
  if (!py) return "#e8e4dc";
  if (/[āēīōūǖ]/.test(py)) return "#4ECDC4";
  if (/[áéíóúǘ]/.test(py)) return "#FFD166";
  if (/[ǎěǐǒǔǚ]/.test(py)) return "#FF8C69";
  if (/[àèìòùǜ]/.test(py)) return "#FF6B6B";
  return "#aaa";
}

// 퀴즈 생성
function makeQuiz(vocab) {
  const shuffled = [...vocab].sort(() => Math.random() - 0.5).slice(0, 5);
  return shuffled.map(v => {
    const wrong = vocab.filter(x => x.zh !== v.zh).sort(() => Math.random()-0.5).slice(0,3);
    const opts = [...wrong.map(w=>w.kr), v.kr].sort(() => Math.random()-0.5);
    return { zh: v.zh, py: v.py, answer: v.kr, opts };
  });
}

          {tab==="mission" && (
            <div>
              <div style={{padding:"16px",borderRadius:14,background:PM[lesson.phase].bg,border:`1px solid ${lc}44`,marginBottom:12}}>
                <div style={{fontSize:11,color:lc,fontWeight:700,marginBottom:7}}>💡 TSC 팁</div>
                <p style={{fontSize:14,color:"#ccc",lineHeight:1.7}}>{lesson.tscTip}</p>
              </div>
              <div style={{padding:"16px",borderRadius:14,background:"#0e1520",border:"1px solid #1a2030",marginBottom:14}}>
                <div style={{fontSize:11,color:"#FFD166",fontWeight:700,marginBottom:7}}>🎯 오늘의 미션</div>
                <p style={{fontSize:14,color:"#ddd",lineHeight:1.7}}>{lesson.mission}</p>
              </div>
              {!isDone ? (
                <>
                  <button onClick={()=>setMissionDone(!missionDone)} style={{width:"100%",padding:"13px",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:10,transition:"all .2s",background:missionDone?lc+"18":"#0e1520",border:`2px solid ${missionDone?lc:"#222"}`,color:missionDone?lc:"#555"}}>
                    {missionDone?"✓ 미션 완료!":"미션을 완료했나요?"}
                  </button>
                  <button onClick={completeDay} style={{width:"100%",padding:"16px",borderRadius:12,border:"none",fontSize:15,fontWeight:900,letterSpacing:"-0.3px",transition:"all .2s",background:missionDone?`linear-gradient(135deg,${lc},${lc}99)`:"#141414",color:missionDone?"#080b0f":"#333",cursor:missionDone?"pointer":"not-allowed"}}>
                    {missionDone?"✓ 오늘 학습 완료 저장":"미션 완료 후 저장 가능"}
                  </button>
                </>
              ) : (
                <div style={{padding:14,borderRadius:12,textAlign:"center",background:lc+"14",border:`1px solid ${lc}44`,color:lc,fontSize:14,fontWeight:700}}>✓ 완료된 학습입니다</div>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── CALENDAR VIEW ──
  if (view==="calendar") {
    return (
      <div style={{minHeight:"100vh",background:BG,color:"#e8e4dc",fontFamily:"'Noto Sans KR','Noto Sans SC',sans-serif",maxWidth:540,margin:"0 auto"}}>
        <style>{GS}</style>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px 12px",borderBottom:"1px solid #111820"}}>
          <button style={{background:"none",border:"none",color:"#888",cursor:"pointer",fontSize:13,fontWeight:600}} onClick={()=>setView("home")}>← 뒤로</button>
          <span style={{fontSize:15,fontWeight:700,color:"#f0ece4"}}>90일 캘린더</span>
          <div style={{width:44}}/>
        </div>
        <div style={{padding:"12px 18px 6px",display:"flex",gap:14}}>
          {[1,2,3].map(p=><div key={p} style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:10,height:10,borderRadius:3,background:PM[p].color}}/><span style={{fontSize:11,color:"#555"}}>{PM[p].label}</span></div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:4,padding:"8px 14px"}}>
          {Array.from({length:90},(_,i)=>i+1).map(day=>{
            const isDone=!!progress[day],isCur=day===currentDay;
            const ph=LESSONS.find(l=>l.day===day)?.phase||1,phc=PM[ph].color;
            return <div key={day} onClick={()=>openLesson(day)} style={{aspectRatio:"1",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,cursor:"pointer",background:isDone?phc:isCur?"#112030":"#0d1015",color:isDone?"#080b0f":isCur?phc:"#2a2a2a",border:isCur?`2px solid ${phc}`:"1px solid #131820",boxShadow:isDone?`0 1px 6px ${phc}44`:"none"}}>{day}</div>;
          })}
        </div>
        <div style={{padding:"8px 14px 40px"}}>
          {[1,2,3].map(p=>{
            const phDone=Object.keys(progress).filter(d=>LESSONS.find(l=>l.day===+d)?.phase===p).length;
            return <div key={p} style={{marginBottom:10,padding:"14px 16px",borderRadius:14,background:PM[p].bg,border:`1px solid ${PM[p].color}33`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:12,fontWeight:700,color:PM[p].color}}>Phase {p}: {PM[p].label}</div><div style={{fontSize:11,color:"#444",marginTop:2}}>{PM[p].days} · {PM[p].desc}</div></div>
                <div style={{fontSize:18,fontWeight:900,color:PM[p].color}}>{phDone}/30</div>
              </div>
              <div style={{marginTop:10,height:4,background:"#0d1015",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${(phDone/30)*100}%`,background:PM[p].color,borderRadius:2,transition:"width .5s"}}/>
              </div>
            </div>;
          })}
        </div>
      </div>
    );
  }

  // ── HOME VIEW ──
  return (
    <div style={{minHeight:"100vh",background:BG,color:"#e8e4dc",fontFamily:"'Noto Sans KR','Noto Sans SC',sans-serif",maxWidth:540,margin:"0 auto"}}>
      <style>{GS}</style>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px 12px",borderBottom:"1px solid #111820"}}>
        <div>
          <div style={{fontSize:19,fontWeight:900,letterSpacing:"-0.5px",color:"#f0ece4"}}>中文 90일</div>
          <div style={{fontSize:10,color:"#3a3a3a",marginTop:1}}>TSC 5-6급 목표 플랜</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{background:"#111318",border:"1px solid #1e1e1e",borderRadius:20,padding:"5px 12px",fontSize:12,fontWeight:700,color:"#FFD166"}}>🔥 {streak}일</div>
          <button style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:20,padding:"4px 6px"}} onClick={()=>setView("stats")}>📊</button>
          <button style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:20,padding:"4px 6px"}} onClick={()=>setView("calendar")}>⊞</button>
        </div>
      </div>

      <div style={{padding:"16px 18px 14px",background:"linear-gradient(160deg,#0a0d12,#0d1520)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:10}}>
          <div>
            <div style={{fontSize:10,color:"#3a3a3a",marginBottom:2}}>전체 진도</div>
            <div style={{fontSize:38,fontWeight:900,lineHeight:1,color:"#f0ece4"}}>{pct}<span style={{fontSize:16,color:"#3a3a3a"}}>%</span></div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:10,color:"#3a3a3a"}}>완료</div>
            <div style={{fontSize:20,fontWeight:900,color:"#f0ece4"}}>{done}<span style={{fontSize:12,color:"#3a3a3a"}}>/90</span></div>
          </div>
        </div>
        <div style={{height:5,background:"#0d1015",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,borderRadius:3,background:`linear-gradient(90deg,${pm.color},${pm.color}88)`,transition:"width .6s"}}/>
        </div>
        <div style={{display:"flex",gap:8,marginTop:14}}>
          {[1,2,3].map(p=>{
            const phDone=Object.keys(progress).filter(d=>LESSONS.find(l=>l.day===+d)?.phase===p).length;
            const active=phase===p;
            return <div key={p} onClick={()=>setView("calendar")} style={{flex:1,padding:"10px 6px",borderRadius:12,textAlign:"center",cursor:"pointer",background:active?PM[p].color+"14":"#0d1015",border:`1px solid ${active?PM[p].color+"55":"#131820"}`}}>
              <div style={{fontSize:10,fontWeight:700,color:PM[p].color}}>Phase {p}</div>
              <div style={{fontSize:9,color:"#444",marginTop:2}}>{PM[p].label}</div>
              <div style={{fontSize:15,fontWeight:900,color:active?PM[p].color:"#aaa",marginTop:4}}>{phDone}/30</div>
            </div>;
          })}
        </div>
      </div>

      {todayL && (
        <div style={{margin:"14px 18px 0",padding:18,borderRadius:18,background:pm.bg,border:`1px solid ${pm.color}33`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={pill(pm.color)}>Day {currentDay} · {pm.label}</div>
            <div style={{fontSize:11,color:"#3a3a3a"}}>{todayL.tscLevel}</div>
          </div>
          <div style={{fontSize:19,fontWeight:900,color:"#f0ece4",marginBottom:6}}>{todayL.theme}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            {["⏱ 30분",`📚 ${todayL.vocab.length}개`,"🃏 플래시카드","✏️ 퀴즈","🎙️ 녹음"].map(t=><span key={t} style={chip}>{t}</span>)}
          </div>
          {progress[currentDay]
            ? <div style={{padding:12,borderRadius:10,background:pm.color+"14",textAlign:"center",color:pm.color,fontSize:13,fontWeight:700}}>✓ 오늘 학습 완료!</div>
            : <button onClick={()=>openLesson(currentDay)} style={{width:"100%",padding:"15px",border:"none",borderRadius:12,background:`linear-gradient(135deg,${pm.color},${pm.color}bb)`,color:"#080b0f",fontSize:15,fontWeight:900,cursor:"pointer",letterSpacing:"-0.3px",marginTop:4}}>오늘 학습 시작하기 →</button>
          }
        </div>
      )}

      {done > 0 && (
        <div style={{padding:"18px 18px 8px"}}>
          <div style={{fontSize:10,color:"#2a2a2a",marginBottom:10,fontWeight:700,letterSpacing:1}}>최근 완료</div>
          {Object.entries(progress).sort((a,b)=>+b[0]-+a[0]).slice(0,3).map(([day,iso])=>{
            const l=LESSONS.find(x=>x.day===+day); if(!l) return null;
            const lpm=PM[l.phase];
            return <div key={day} onClick={()=>openLesson(+day)} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:"1px solid #0d1015",cursor:"pointer"}}>
              <div style={{width:36,height:36,borderRadius:10,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,background:lpm.color+"18",color:lpm.color}}>D{day}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:"#ddd"}}>{l.theme}</div>
                <div style={{fontSize:11,color:"#3a3a3a",marginTop:2}}>{new Date(iso).toLocaleDateString("ko-KR")} · {lpm.label}</div>
              </div>
              <div style={{color:"#222",fontSize:20}}>›</div>
            </div>;
          })}
        </div>
      )}
      <div style={{height:40}}/>
    </div>
  );
}


// localStorage 기반 storage (GitHub Pages용)
window.storage = {
  get: async (key) => {
    try {
      const val = localStorage.getItem(key);
      if (val === null) throw new Error("not found");
      return { key, value: val };
    } catch(e) { throw e; }
  },
  set: async (key, value) => {
    localStorage.setItem(key, value);
    return { key, value };
  },
  delete: async (key) => {
    localStorage.removeItem(key);
    return { key, deleted: true };
  }
};

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
